<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A Site about Banner Recommendations for the Game: Brown Dust 2. Made by Zormolo & Botan">

  <link rel="apple-touch-icon" sizes="180x180" href="./public/images/favicon/apple-touch-icon.png">

  <meta name="googlebot" content="index, follow">

  <link rel="preload" href="./public/json/utils.json" crossorigin="anonymous" as="fetch">
  <link rel="preload" href="./public/js/generateSite.js" crossorigin="anonymous" as="script">
  <link rel="preload" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" as="style">
  <link rel="preload" href="./public/css/custom.css" crossorigin="anonymous" as="style">
  <link rel="preload" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous" as="script">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="./public/css/custom.css" crossorigin="anonymous">
  <title>Brown Dust 2 - Banner Recommendation</title>
</head>
<body class="container-fluid">
  <header class="row small-header sticky-header">
    <nav class="col navbar bg-body-secondary">
      <div class="container justify-content-center w-100 mx-0 px-0">
        <div class="row w-100 text-center pb-2 mx-0" >
          <div class="col pe-3"><b>Banner Recommendation</b></div>
        </div>
        <div class="row w-100 align-items-center">

          <div class="col-auto">
            <button type="button" class="btn btn-secondary py-0 px-1" data-bs-toggle="modal" data-bs-target="#burgerMenu">
              <span>
                <svg class="burger-icon"  xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path fill="currentColor" d="M96 160C96 142.3 110.3 128 128 128L512 128C529.7 128 544 142.3 544 160C544 177.7 529.7 192 512 192L128 192C110.3 192 96 177.7 96 160zM96 320C96 302.3 110.3 288 128 288L512 288C529.7 288 544 302.3 544 320C544 337.7 529.7 352 512 352L128 352C110.3 352 96 337.7 96 320zM544 480C544 497.7 529.7 512 512 512L128 512C110.3 512 96 497.7 96 480C96 462.3 110.3 448 128 448L512 448C529.7 448 544 462.3 544 480z"/></svg>
              </span>
            </button>
          </div>
          <div class="col-auto ms-auto">
            <select data-shortcut-container-small class="form-select"></select>
          </div>
        </div>
      </div>
    </nav>
  </header>
  <header class="row big-header sticky-header">
    <nav class="navbar bg-body-secondary">
      <div class="container-fluid">

        <div class="d-flex flex-row align-items-center">
          <div class="pe-3 text-blue"><b>Banner Recommendation</b></div>
          <a class="btn btn-secondary" href="/BD2-Banner-Recommendation/archive.html">Archive</a>
        </div>

        <ul class="navbar-nav flex-row gap-3">
          <li class="nav-item">
            <a class="btn btn-warning text-truncate" href="https://github.com/Zormolo/BD2-Banner-Recommendation/issues/new" target="_blank">Report Issue</a>
          </li>
          <li class="nav-item d-flex align-items-center">
            <a class="btn btn-outline-secondary">
              <span class="pe-1 text-truncate">
                <img class="d-none d-sm-inline" src="./public/images/discord.svg" width="20px" height="20px" alt="">
              </span>
              @zormolo
            </a>
          </li>
          <li class="nav-item">
            <select data-shortcut-container-big class="form-select text-truncate"></select>
          </li>
        </ul>

      </div>
    </nav>
  </header>
  <main class="row">
    <div class="to-small">
      <picture>
        <source class="costumeSize" type="image/avif" srcset="./public/images/avif/to-small.avif">
        <img class="costumeSize" loading="lazy" src="./public/images/to-small.png" alt="to small device-width" title="to small device-width">
      </picture>
    </div>

    <div id="main-container" class="container-fluid pt-2">
      <div class="row pb-3">
        <div class="col-12 col-md-11 col-xl-10 mx-auto">
          <section class="container-fluid pb-2 border rounded-top">

            <div class="row">
              <div class="col-2 d-flex justify-content-center mx-0 flex-grow-1">
                <h1><u>TLDR</u></h1>
              </div>
            </div>

            <div class="row">
              <div data-tldr class="col-12 pb-2 d-flex flex-wrap justify-content-center arrowHide"></div>
            </div>

          </section>
        </div>
      </div>

      <template id="charBannerCard">
        <section data-char-banner-card class="row pt-2">
          <div class="col-11 mx-auto bg-body-tertiary rounded">
            <div class="row h-100 py-2">

              <div class="col-12 col-md-4 col-xl-2 pe-2 border-end borderless">
                <div class="w-100 h-100 d-flex justify-content-center">
                  <picture class="my-auto">
                    <source data-costume-image-avif class="costumeSize" type="image/avif" />
                    <img data-costume-image class="costumeSize" loading="lazy">
                  </picture>
                </div>
              </div>

              <div class="col d-flex flex-column">
                <div class="row border-bottom mx-1 pb-2 pt-4 pt-md-0  border-2">
                  <div data-banner-name class="col d-flex justify-content-center">
                  </div>
                </div>

                <div class="row py-2">
                  <div class="col no-px">
                    <div class="container-fluid">
                      <ul class="nav nav-pills gap-1" role="tablist">
                        <li class="nav-item tablist-entry">
                          <button class="nav-link active" data-basic-tab data-bs-toggle="tab" data-bs-target="#basic" type="button" role="tab">Basic Info</button>
                        </li>
                        <li class="nav-item tablist-entry">
                          <button class="nav-link" data-pac-tab data-bs-toggle="tab" data-bs-target="#pac" type="button" role="tab">Pros & Cons</button>
                        </li>
                        <li class="nav-item tablist-entry">
                          <button class="nav-link" data-mode-tab data-bs-toggle="tab" data-bs-target="#mode" type="button" role="tab">Mode Rating</button>
                        </li>
                      </ul>
                    </div>
                  </div>
                </div>

                <div class="tab-content d-flex flex-grow-1">
                  <div class="container-fluid tab-pane fade show active" id="basic" role="tabpanel">
                    <div class="row h-100">

                      <div class="col-12 col-xl-4 col-xxl-4 pe-0 pt-3 pb-2 py-xl-0 d-flex align-items-center">
                        <div class="w-100">
                          <ul class="list-unstyled">
                            <li class="pb-1"><span data-role><b>Role - </b></span></li>
                            <li><span><b>Element - </b><img data-property loading="lazy" width="32px" height="32px"></span></li>
                            <li><b data-dmg-type><span class="text-light">Damage Type - </span></b></li>
                            <br>
                            <li data-banner-periode></li>
                            <li data-banner-time-left></li>
                          </ul>
                        </div>
                      </div>

                      <div class="col-12 col-xl-8 col-xxl-4 d-flex align-items-center">
                        <div class="container-fluid">
                          <div class="row pb-3">
                            <div class="col px-0">
                              <h2>Breakpoints:</h2>
                            </div>
                          </div>
                          <div class="row w-100">
                            <div class="col px-0">
                              <ul data-breakpoints class="list-group list-group-flush p-2 border border-3 rounded"></ul>
                            </div>
                          </div>
                        </div>

                      </div>

                      <div class="col-12 col-xl-12 col-xxl-4 pt-3 pt-xxl-0 d-flex align-items-center">
                        <div class="container-fluid">
                          <div class="row pb-3">
                            <div class="col px-0">
                              <h2>Should you pull on this banner?</h2>
                            </div>
                          </div>
                          <div class="row">
                            <div class="col px-0">
                              <p data-pull-rec></p>
                            </div>
                          </div>
                        </div>
                      </div>

                    </div>
                  </div>

                  <div class="container-fluid tab-pane fade" id="pac" role="tabpanel">
                    <div class="row h-100">

                      <div class="col-6 d-flex flex-column border-end border-2">
                        <div class="row pt-2">
                          <h3 class="text-success">Pros</h3>
                        </div>
                        <div class="row flex-grow-1">
                          <div class="col">
                            <ul data-pros class="list-group"></ul>
                          </div>
                        </div>
                      </div>

                      <div class="col-6 d-flex flex-column">
                        <div class="row pt-2">
                          <h3 class="text-danger">Cons</h3>
                        </div>
                        <div class="row flex-grow-1">
                          <div class="col">
                            <ul data-cons class="list-group"></ul>
                          </div>
                        </div>

                      </div>

                    </div>
                  </div>

                  <div class="container-fluid tab-pane fade" id="mode" role="tabpanel">
                    <div class="row h-100">
                      <div class="col pt-4">
                        <div class="container-fluid py-2 text-center">

                          <div class="row pb-2 border-bottom border-3">
                            <div class="col-4"><b>Fiend Hunter [FH]</b></div>
                            <div class="col-4"><b>Guild Raid [GR]</b></div>
                            <div class="col-4"><b>Last Night [LN]</b></div>
                          </div>
                          <div class="row pb-3">
                            <div data-fh class="col-4"></div>
                            <div data-gr class="col-4"></div>
                            <div data-ln class="col-4"></div>
                          </div>
                          <div class="row py-2 border-bottom border-3">
                            <div class="col-4"><b>Tower of Salvation [TOS]</b></div>
                            <div class="col-4"><b>Mirror War [MW]</b></div>
                            <div class="col-4"><b>Golden Colloseum [GC]</b></div>
                          </div>
                          <div class="row pb-3">
                            <div data-tos class="col-4"></div>
                            <div data-mw class="col-4"></div>
                            <div data-gc class="col-4"></div>
                          </div>
                          <div class="row pb-2 border-bottom border-3 justify-content-center">
                            <div class="col text-center"><b>General / Event Challanges</b></div>
                          </div>
                          <div class="row justify-content-center">
                            <div data-gen class="col-6"></div>
                          </div>

                        </div>
                      </div>
                    </div>
                  </div>
                </div>

              </div>

            </div>
          </div>
        </section>
      </template>
    </div>
  </main>

  <footer class="row bg-body-tertiary">
    <div class="container-fluid">
      <nav class="navbar">
        <div class="container-fluid">
          <h5>&copy; Zormolo & Botan - <script>document.write( new Date().getFullYear() )</script></h3>
          <a href="https://github.com/Zormolo/BD2-Banner-Recommendation" class="btn btn-dark">
            <img src="./public/images/github-mark-white.svg" width="24px" height="24px" alt="">
            <span class="ps-2">Code & Issues</span>
          </a>
        </div>
      </nav>
    </div>
  </footer>

  <div class="modal fade" id="burgerMenu" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">

          <div class="row header-btn-rotation align-items-center pb-2 w-100 mx-0">
            <div class="col-8 col-sm-4 text-center">
              <a class="btn btn-secondary w-100" href="/BD2-Banner-Recommendation/archive.html">Archive</a>
            </div>
            <div class="col-8 col-sm-4 text-center">
              <a class="btn btn-warning w-100 text-truncate" href="https://github.com/Zormolo/BD2-Banner-Recommendation/issues/new" target="_blank">Report Issue</a>
            </div>
            <div class="col-8 col-sm-4 text-center">
              <a class="btn btn-outline-secondary w-100 text-truncate" title="@zormolo">
                <span class="pe-1 text-truncate">
                  <img class="d-none d-sm-inline" src="./public/images/discord.svg" width="20px" height="20px" alt="">
                </span>
                @zormolo
              </a>
            </div>
          </div>

        </div>

      </div>
    </div>
  </div>

  <script src="./public/js/generateSite.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    document.getElementById('burgerMenu')
  .addEventListener('shown.bs.modal', () => {
    console.log('shown');
    console.log(document.activeElement);
  });
  </script>
</body>
</html>
